[versions]
kotlin = "2.2.21"
kotlinx-serialization = "1.9.0"
ksp = "2.3.3"
agp = "9.0.0-beta03"
room = "2.8.4"
activity = "1.12.1"
compose = "2025.12.00"
material3-adaptive-nav3 = "1.3.0-alpha05"
nav3 = "1.0.0"
lifecycle-viewmodel-nav3 = "2.10.0"
dslUtilities = "1.0.2"
capsule = "1.0.2"

[libraries]
kotlin-reflect = { module = "org.jetbrains.kotlin:kotlin-reflect", version.ref = "kotlin" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinx-serialization" }
kotlinx-serialization-cbor = { module = "org.jetbrains.kotlinx:kotlinx-serialization-cbor", version.ref = "kotlinx-serialization" }
room-runtime = { module = "androidx.room:room-runtime", version.ref = "room" }
room-compiler = { module = "androidx.room:room-compiler", version.ref = "room" }
room-ktx = { module = "androidx.room:room-ktx", version.ref = "room" }
activity-compose = { module = "androidx.activity:activity-compose", version.ref = "activity" }
compose = { module = "androidx.compose:compose-bom", version.ref = "compose" }
compose-runtime = { module = "androidx.compose.runtime:runtime" }
compose-foundation = { module = "androidx.compose.foundation:foundation" }
compose-ui = { module = "androidx.compose.ui:ui" }
compose-uiToolingPreview = { module = "androidx.compose.ui:ui-tooling-preview" }
compose-animation = { module = "androidx.compose.animation:animation" }
compose-material3 = { module = "androidx.compose.material3:material3" }
compose-material3-adaptive = { module = "androidx.compose.material3.adaptive:adaptive-navigation3", version.ref = "material3-adaptive-nav3" }
navigation3-runtime = { module = "androidx.navigation3:navigation3-runtime", version.ref = "nav3" }
navigation3-ui = { module = "androidx.navigation3:navigation3-ui", version.ref = "nav3" }
lifecycle-viewmodel-navigation3 = { module = "androidx.lifecycle:lifecycle-viewmodel-navigation3", version.ref = "lifecycle-viewmodel-nav3" }
dslUtilities = { module = "top.ltfan.dslutilities:dsl-utilities", version.ref = "dslUtilities" }
capsule = { module = "top.ltfan.capsule:capsule", version.ref = "capsule" }

[bundles]
kotlinx-serialization = [
    "kotlinx-serialization-json",
    "kotlinx-serialization-cbor"
]
androidx = [
    "room-runtime",
    "room-ktx",
    "activity-compose"
]
compose = [
    "compose-runtime",
    "compose-foundation",
    "compose-ui",
    "compose-uiToolingPreview",
    "compose-animation",
    "compose-material3",
    "compose-material3-adaptive",
    "navigation3-runtime",
    "navigation3-ui",
    "lifecycle-viewmodel-navigation3"
]
ltfan = [
    "dslUtilities",
    "capsule"
]

[plugins]
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
android-application = { id = "com.android.application", version.ref = "agp" }
room = { id = "androidx.room", version.ref = "room" }
