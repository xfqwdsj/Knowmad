name: Build App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout Koog fix
        uses: actions/checkout@v6
        with:
          repository: xfqwdsj/koog-fixed-llm-provider
          path: koog-fixed-llm-provider
          fetch-depth: 1

      - name: Get Koog SHA
        id: koog-sha
        run: |
          echo "sha=$(git -C koog-fixed-llm-provider rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache Koog Maven Artifacts
        id: cache-koog
        uses: actions/cache/restore@v5
        with:
          path: ~/.m2/repository/ai/koog
          key: ${{ runner.os }}-maven-koog-${{ steps.koog-sha.outputs.sha }}
          restore-keys: |
            ${{ runner.os }}-maven-koog-

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build Koog
        if: steps.cache-koog.outputs.cache-hit != 'true'
        run: |
          cd koog-fixed-llm-provider
          ./gradlew publishJvmPublicationToMavenLocal \
            publishKotlinMultiplatformPublicationToMavenLocal \
            :serialization:serialization-jackson:publishToMavenLocal \
            --no-daemon

      - name: Save Koog Cache
        if: steps.cache-koog.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.m2/repository/ai/koog
          key: ${{ runner.os }}-maven-koog-${{ steps.koog-sha.outputs.sha }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Write signing files
        run: |
          echo ${{ secrets.KEY_FILE }} | base64 --decode > app/key.jks
          echo ${{ secrets.KEY_PROPERTIES }} | base64 --decode > app/key.properties

      - name: Build
        run: |
          ./gradlew assembleRelease --no-daemon

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/release/app-arm64-v8a-release.apk app/build/outputs/apk/release/Knowmad-arm64-v8a-${{ github.sha }}.apk
          mv app/build/outputs/apk/release/app-x86_64-release.apk app/build/outputs/apk/release/Knowmad-x86_64-${{ github.sha }}.apk

      - name: Upload arm64-v8a artifact
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Knowmad-arm64-v8a-${{ github.sha }}.apk
          path: app/build/outputs/apk/release/Knowmad-arm64-v8a-${{ github.sha }}.apk

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Knowmad-x86_64-${{ github.sha }}.apk
          path: app/build/outputs/apk/release/Knowmad-x86_64-${{ github.sha }}.apk
